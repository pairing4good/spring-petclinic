# Playwright Configuration for Spring PetClinic
# Base URL for the application
playwright.baseurl=http://localhost:8080

# Browser settings
playwright.browsers=chromium,firefox,webkit
playwright.headless=true

# Test settings
playwright.timeout=30000
playwright.retries.ci=2
playwright.retries.local=0

# Screenshots and videos
playwright.screenshot=only-on-failure
playwright.video=retain-on-failure
playwright.trace=on-first-retry

# Parallel execution
playwright.workers.ci=1
playwright.workers.local=4