# Test configuration for Playwright tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable unnecessary features for testing
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=

# Logging configuration for tests
logging.level.org.springframework.samples.petclinic=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot=WARN
logging.level.com.microsoft.playwright=WARN

# Ensure H2 database is initialized with test data
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/h2/data.sql