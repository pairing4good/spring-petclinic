# Playwright Configuration for Spring PetClinic E2E Tests
# Base URL for the application
playwright.baseUrl=http://localhost:8080

# Browser settings
playwright.browser=chromium
playwright.headless=true
playwright.slowMo=0

# Test settings
playwright.timeout=30000
playwright.expect.timeout=5000
playwright.retries.local=0
playwright.retries.ci=2

# Viewport settings
playwright.viewport.width=1280
playwright.viewport.height=720

# Screenshots and videos
playwright.screenshot.mode=only-on-failure
playwright.video.mode=retain-on-failure

# Test patterns
playwright.testPattern=**/*E2ETest.java