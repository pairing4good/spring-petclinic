# This workflow will build a Java project with Gradle, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'adopt'
          cache: maven
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Install Playwright Browsers
        run: |
          ./gradlew build -x test
          java -cp "build/classes/java/test:$(./gradlew printClasspath -q)" com.microsoft.playwright.CLI install chromium firefox || echo "Browser installation failed, tests may be skipped"
      - name: Build with Gradle
        run: ./gradlew build
      - name: Run End-to-End Tests
        run: ./gradlew e2eTest
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-test-results-${{ matrix.java }}
          path: build/reports/tests/
