name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'adopt'
          cache: maven
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew build
        
      # Install Playwright browsers - This is the key step for E2E tests!
      - name: Install Playwright Browsers
        run: |
          # Install system dependencies for browsers
          sudo apt-get update
          sudo apt-get install -y libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon-dev libxcomposite-dev libxdamage-dev libxrandr2 libgbm-dev libxss1 libasound-dev
          # Note: Gradle build already includes Playwright tests, so browsers are needed
          echo "Browser dependencies installed for Gradle Playwright tests"
          
      # Upload test results for failed tests
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gradle-test-results
          path: |
            build/reports/
            build/test-results/
          retention-days: 30
