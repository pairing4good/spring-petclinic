name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'adopt'
          cache: maven
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew build
      - name: Set up Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run Playwright tests (3x for stability)
        run: |
          echo "Running Playwright tests with 3 attempts for stability..."
          
          # Attempt 1
          if ./gradlew playwrightTest; then
            echo "✅ Playwright tests passed on attempt 1"
            exit 0
          else
            echo "❌ Playwright tests failed on attempt 1, trying again..."
          fi
          
          # Attempt 2
          if ./gradlew playwrightTest; then
            echo "✅ Playwright tests passed on attempt 2"
            exit 0
          else
            echo "❌ Playwright tests failed on attempt 2, final attempt..."
          fi
          
          # Attempt 3 (final)
          if ./gradlew playwrightTest; then
            echo "✅ Playwright tests passed on attempt 3"
            exit 0
          else
            echo "❌ Playwright tests failed all 3 attempts"
            exit 1
          fi
      - name: Upload Playwright screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: target/playwright-screenshots/
          if-no-files-found: ignore
