name: "Copilot Setup Steps"
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it won't be picked up by Copilot
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          # Remove cache if you don't have package-lock.json yet
      
      - name: Install or update dependencies
        run: |
          # Install Playwright if not already in package.json
          if [ ! -f "package.json" ]; then
            npm init -y
          fi
          
          # Install Playwright test package if not present
          if ! npm list @playwright/test > /dev/null 2>&1; then
            npm install --save-dev @playwright/test
          fi
          
          # Install all dependencies
          npm install
      
      - name: Install Playwright browsers and dependencies
        run: npx playwright install --with-deps
        # Alternative: Install only specific browsers to save time
        # run: npx playwright install chromium --with-deps
      
      # Optional: Verify installation
      - name: Verify Playwright installation
        run: npx playwright --version
