name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'adopt'
          cache: maven
      - name: Build with Maven Wrapper
        run: ./mvnw -B verify
      
      # Install Playwright browsers - This is the key step for E2E tests!
      - name: Install Playwright Browsers
        run: |
          # Install system dependencies for browsers
          sudo apt-get update
          sudo apt-get install -y libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon-dev libxcomposite-dev libxdamage-dev libxrandr2 libgbm-dev libxss1 libasound-dev
          # Run Maven to trigger Playwright browser installation
          ./mvnw exec:java -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install chromium" -Dexec.includeProjectDependencies=true || echo "Browser installation may have failed, continuing with system browsers"
      
      # Run E2E tests
      - name: Run E2E Tests
        run: ./mvnw test -Dtest="**/*FlowTest"
        
      # Upload test results for failed tests
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: |
            target/surefire-reports/
            playwright-report/
            test-results/
          retention-days: 30
      
      # Upload test results for successful tests  
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 30
