# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'adopt'
          cache: maven
      - name: Build with Maven Wrapper
        run: ./mvnw -B verify
      
      # Install Node.js for Playwright
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Install Playwright dependencies
      - name: Install Playwright dependencies
        run: npm ci
      
      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      
      # Run Playwright tests three times to ensure reliability
      - name: Run Playwright Tests (First Run)
        run: npm test
      
      - name: Run Playwright Tests (Second Run)
        run: npm test
      
      - name: Run Playwright Tests (Third Run)
        run: npm test
      
      # Upload Playwright test results
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
